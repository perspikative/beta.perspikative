                     💭 <strong>Imagination :</strong> 60% réfléchie • 40% improvisée<br>
                     💬 <strong>Commentaires :</strong><br>
                     Ce petit restaurant dans Kayoupolis, détenu par Mme Roche, était très apprécié dans le quartier. Kayou's Diner, c'était un projet ambitieux dans une ville où cailloux et cacahuètes vivaient sous tension. Mais Mme Roche voulait rapprocher ces 2 races, car elle estimait que les différences ne devaient pas les séparer. Et même si les cacahuètes leurs cassaient les cou*... cacahuètes hum, elle a réussi."

          data-desc="🎨 <strong>Teintes :</strong> Noir et blanc<br>

                     💭 <strong>Imagination :</strong> 90% improvisée • 10% d'Internet<br>
                     💬 <strong>Commentaires :</strong><br>
                     Je l'ai entendu. Il était au dessus de moi. Je le sais ; il se levait pour prendre un livre et raviver le feu. Il semblait qu'il ait tout fait lui-même : les murs,
                     l'imposante cheminée, les meubles, son parquet. Tout. Et ce fada de lecture et collectionneur d'assiettes en porcelaine nous en cache certainement bien d'autres là
                     haut, dans le plafond… 📰"

                     💬 <strong>Commentaires :</strong><br>
                     Imaginé et dessiné en deux soirs, cette création pourtant complexe nous embarque dans un rêve matériel. Inspiré d'une vieille histoire que j'ai écrite, ce paysage
                     m'est immédiatement apparu quand j'ai relu un passage. Entrez donc, dans cet imaginaire débordant et envoûtant. Cette ville, dans une vaste plaine blanche, est un
