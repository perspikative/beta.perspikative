<!doctype html>
<html lang="fr"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Runner</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rubik', sans-serif; overflow: hidden; }
        #game-wrapper {
            position: relative;
            width: 100%;
            height: calc(100 * min(var(--vh, 1vh), 1vh));
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }
        #bg-layer {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 1;
        }
        #ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(180deg, #1b4332 0%, #0b3d2c 100%);
            border-top: 3px solid #40916c;
        }
        #cat {
            position: absolute; bottom: 80px; left: 80px;
            width: 80px; height: 80px;
            cursor: pointer; transition: none;
            animation: catRun 0.6s steps(2) infinite;
        }
        @keyframes catRun {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(1); }
        }
        .obstacle {
            position: absolute; bottom: 80px;
            width: 30px; height: 50px;
            background: linear-gradient(135deg, #1b9e77 0%, #d95f02 100%);
            border-radius: 4px;
        }
        #score-display {
            position: absolute; top: 20px; right: 30px;
            font-size: 28px; font-weight: 700; color: #e8f5e9;
            font-variant-numeric: tabular-nums;
        }
        #logo-display {
            position: absolute; top: 20px; left: 20px;
            width: 60px; height: 60px;
        }
        #overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; text-align: center;
            background: rgba(15, 32, 39, 0.7);
            backdrop-filter: blur(4px);
        }
        #overlay h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        #overlay p { font-size: 1.1rem; opacity: 0.7; }
        .hidden { display: none !important; }
        @keyframes catJump {
            0% { transform: translateY(0); }
            40% { transform: translateY(-120px); }
            100% { transform: translateY(0); }
        }
        #cat.jumping {
            animation: catJump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1 !important;
        }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" style="background: linear-gradient(135deg, rgb(15, 32, 39), rgb(32, 58, 67), rgb(44, 83, 100));">
  <div id="game-wrapper">
   <img id="bg-layer" data-template-id="bg-image" class="canva-image" loading="lazy" src="canva://MAHJvdB7r2Y/1" alt="Forêt de bouleaux avec maison dessinée">
   <div id="ground"></div><img id="cat" data-template-id="cat-sprite" class="canva-image" loading="lazy" src="canva://MAHJRcdYoUE/1" alt="Chat noir personnage du jeu"> <img id="logo-display" data-template-id="logo-image" class="canva-image" loading="lazy" src="canva://MAHHGPzwgW0/1" alt="Logo Perspikative">
   <div id="score-display">
    0
   </div>
   <div id="overlay">
    <h1 data-template-id="start-text" class="canva-text" style="color: rgb(232, 245, 233); font-weight: 700; font-style: normal; font-size: 32px;">Cliquez sur le chat !</h1>
    <p data-template-id="start-sub" class="canva-text" style="color: rgb(200, 230, 201); font-weight: 700; font-style: normal; font-size: 16px;">Espace ou clic pour sauter</p>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        const cat = document.getElementById('cat');
        const wrapper = document.getElementById('game-wrapper');
        const scoreEl = document.getElementById('score-display');
        const overlay = document.getElementById('overlay');
        const bgLayer = document.getElementById('bg-layer');

        let running = false, gameOver = false;
        let catY = 0, velY = 0, gravity = 0.8, jumpForce = -15;
        let score = 0, speed = 6, obstacles = [], lastObstacle = 0, frameId;
        let bgX = 0;

        function start() {
            running = true; gameOver = false; score = 0; speed = 6;
            catY = 0; velY = 0; bgX = 0;
            obstacles.forEach(o => o.el.remove());
            obstacles = []; lastObstacle = 0;
            overlay.classList.add('hidden');
            scoreEl.textContent = '0';
            loop();
        }

        function jump() {
            if (!running) return;
            if (catY === 0) {
                velY = jumpForce;
                cat.classList.add('jumping');
                setTimeout(() => cat.classList.remove('jumping'), 500);
            }
        }

        function loop() {
            // Cat physics
            velY += gravity;
            catY += velY;
            if (catY >= 0) { catY = 0; velY = 0; }
            cat.style.transform = `translateY(${catY}px)`;

            // Background parallax
            bgX = 0;
            bgLayer.style.transform = `translateX(0px)`;

            // Obstacles
            lastObstacle++;
            if (lastObstacle > 80 + Math.random() * 60) {
                spawnObstacle(); lastObstacle = 0;
            }
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= speed;
                o.el.style.left = o.x + 'px';
                if (o.x < -40) { o.el.remove(); obstacles.splice(i, 1); continue; }
                // Collision
                if (o.x < 140 && o.x > 60 && catY > -50) {
                    endGame(); return;
                }
            }

            score++;
            scoreEl.textContent = Math.floor(score / 5);
            if (score % 300 === 0) speed += 0.5;

            frameId = requestAnimationFrame(loop);
        }

        function spawnObstacle() {
            const el = document.createElement('div');
            el.className = 'obstacle';
            const h = 30 + Math.random() * 40;
            el.style.height = h + 'px';
            el.style.left = wrapper.offsetWidth + 'px';
            wrapper.appendChild(el);
            obstacles.push({ el, x: wrapper.offsetWidth });
        }

        function endGame() {
            running = false; gameOver = true;
            cancelAnimationFrame(frameId);
            document.querySelector('[data-template-id="start-text"]').textContent = 'Game Over!';
            document.querySelector('[data-template-id="start-sub"]').textContent = 'Score: ' + Math.floor(score / 5) + ' — Cliquez pour rejouer';
            overlay.classList.remove('hidden');
        }

        wrapper.addEventListener('click', () => {
            if (!running && !gameOver) start();
            else if (gameOver) start();
            else jump();
        });
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); if (!running) start(); else jump(); }
        });
    </script>
