<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Perspikative — Auth</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #061a14;
            --teal-1: #00e5a0;
            --teal-2: #00c9e0;
            --teal-3: #0af5b0;
            --glass-bg: rgba(0, 200, 160, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255,255,255,0.06);
            --input-border: rgba(255,255,255,0.15);
            --text: #e8fff8;
            --text-muted: rgba(200, 255, 230, 0.55);
            --shadow-white: 0 0 0 1px rgba(255,255,255,0.08),
                            inset 0 1px 0 rgba(255,255,255,0.18),
                            inset 0 -1px 0 rgba(255,255,255,0.05),
                            0 8px 32px rgba(0,0,0,0.4),
                            0 2px 8px rgba(0,0,0,0.3);
            --glow: 0 0 40px rgba(0,229,160,0.15), 0 0 80px rgba(0,201,224,0.08);
        }

        html, body {
            min-height: 100%;
            font-family: 'Rubik', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── Animated gradient background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,229,160,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 85% 80%, rgba(0,201,224,0.20) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(10,245,176,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%   { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Noise overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 28px;
        }

        /* ── Logo / Header ── */
        .logo {
            text-align: center;
            animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--teal-1), var(--teal-2));
            box-shadow: 0 0 24px rgba(0,229,160,0.4), var(--shadow-white);
            margin-bottom: 12px;
            font-size: 26px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--teal-1), var(--teal-2), var(--teal-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        /* ── Glass card ── */
        .glass-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-white), var(--glow);
            padding: 32px 30px;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        .glass-card:nth-child(3) { animation-delay: 0.08s; }
        .glass-card:nth-child(4) { animation-delay: 0.16s; }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .card-header .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,229,160,0.25), rgba(0,201,224,0.15));
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, var(--teal-1), var(--teal-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Inputs ── */
        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .field input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 11px 16px;
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .field input::placeholder {
            color: rgba(200,255,230,0.3);
        }

        .field input:focus {
            border-color: rgba(0,229,160,0.5);
            background: rgba(0,229,160,0.08);
            box-shadow: 0 0 0 3px rgba(0,229,160,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* ── Buttons ── */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            font-family: 'Rubik', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .btn:hover::after { background: rgba(255,255,255,0.06); }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal-1) 0%, var(--teal-2) 100%);
            color: #061a14;
            box-shadow: 0 4px 20px rgba(0,229,160,0.35), 0 1px 0 rgba(255,255,255,0.3) inset;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 28px rgba(0,229,160,0.5), 0 1px 0 rgba(255,255,255,0.3) inset;
            filter: brightness(1.05);
        }

        .btn-google {
            background: rgba(255,255,255,0.07);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.11);
            border-color: rgba(255,255,255,0.25);
        }

        .btn-danger {
            background: rgba(255,80,80,0.1);
            color: rgba(255,160,160,0.9);
            border: 1px solid rgba(255,80,80,0.25);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .btn-danger:hover {
            background: rgba(255,80,80,0.18);
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0 6px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }

        /* ── Message banner ── */
        #message {
            width: 100%;
            max-width: 420px;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.2);
            color: var(--teal-1);
            box-shadow: 0 0 20px rgba(0,229,160,0.08), var(--shadow-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
            transition: all 0.3s ease;
        }

        #message.error {
            background: rgba(255,80,80,0.08);
            border-color: rgba(255,80,80,0.25);
            color: rgba(255,160,160,0.9);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="page">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-mark">✦</div>
            <h1>Perspikative</h1>
            <p>Espace compte &amp; authentification</p>
        </div>

        <!-- Message -->
        <div id="message">Aucun utilisateur connecté.</div>

        <!-- Sign Up -->
        <div class="glass-card" id="signupCard">
            <div class="card-header">
                <div class="icon">✉</div>
                <h2>Créer un compte</h2>
            </div>
            <div class="field">
                <label>Adresse e-mail</label>
                <input type="email" id="signupEmail" placeholder="ton@email.com">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="signupPassword" placeholder="••••••••">
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="signupButton">Créer mon compte</button>
            </div>
        </div>

        <!-- Sign In -->
        <div class="glass-card" id="signinCard">
            <div class="card-header">
                <div class="icon">🔑</div>
                <h2>Se connecter</h2>
            </div>
            <div class="field">
                <label>Adresse e-mail</label>
                <input type="email" id="signinEmail" placeholder="ton@email.com">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="signinPassword" placeholder="••••••••">
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="signinButton">Se connecter</button>
                <div class="divider">ou</div>
                <button class="btn btn-google" id="googleSigninButton">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuer avec Google
                </button>
            </div>
        </div>

        <!-- Sign Out (logged-in state) -->
        <div class="glass-card" id="signoutCard" style="display:none;">
            <div class="card-header">
                <div class="icon">👤</div>
                <h2>Session active</h2>
            </div>
            <div class="btn-group">
                <button class="btn btn-danger" id="signOutButton">Se déconnecter</button>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0qLI25TEj7yVyObLjbDSipsFFm8lFZtY",
            authDomain: "perspikative-26800.firebaseapp.com",
            projectId: "perspikative-26800",
            storageBucket: "perspikative-26800.appspot.com",
            messagingSenderId: "520735354440",
            appId: "1:520735354440:web:3607aac59cf6f30c97727d"
        };

        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();

        var msg = document.getElementById('message');
        var signupCard = document.getElementById('signupCard');
        var signinCard = document.getElementById('signinCard');
        var signoutCard = document.getElementById('signoutCard');

        function setMsg(text, isError) {
            msg.textContent = text;
            msg.className = isError ? 'error' : '';
        }

        auth.onAuthStateChanged(function(user) {
            if (user) {
                setMsg('\u2714 Bienvenue, ' + user.email, false);
                signupCard.style.display = 'none';
                signinCard.style.display = 'none';
                signoutCard.style.display = 'block';
            } else {
                setMsg('Aucun utilisateur connect\u00e9.', false);
                signupCard.style.display = 'block';
                signinCard.style.display = 'block';
                signoutCard.style.display = 'none';
            }
        });

        document.getElementById('signupButton').addEventListener('click', function() {
            var email = document.getElementById('signupEmail').value;
            var password = document.getElementById('signupPassword').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(function(c) { setMsg('\u2714 Compte cr\u00e9\u00e9 : ' + c.user.email, false); })
                .catch(function(e) { setMsg(e.message, true); });
        });

        document.getElementById('signinButton').addEventListener('click', function() {
            var email = document.getElementById('signinEmail').value;
            var password = document.getElementById('signinPassword').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(function(c) { setMsg('\u2714 Connect\u00e9 en tant que ' + c.user.email, false); })
                .catch(function(e) { setMsg(e.message, true); });
        });

        document.getElementById('googleSigninButton').addEventListener('click', function() {
            var provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(function(r) { setMsg('\u2714 Connect\u00e9 via Google : ' + r.user.displayName, false); })
                .catch(function(e) { setMsg(e.message, true); });
        });

        document.getElementById('signOutButton').addEventListener('click', function() {
            auth.signOut()
                .then(function() { setMsg('D\u00e9connect\u00e9 avec succ\u00e8s.', false); })
                .catch(function(e) { setMsg(e.message, true); });
        });
    </script>
</body>
</html>
