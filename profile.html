<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Perspikative - Profile</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 500px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #7c5cff;
      color: white;
      cursor: pointer;
    }

    .info {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Mon profil</h1>

    <img id="photo" class="avatar" src="" />

    <div class="info">
      Photo de profil (non modifiable ici)
    </div>

    <label>Username</label>
    <input id="username" />

    <label>Nom d'affichage</label>
    <input id="displayName" />

    <label>Bio</label>
    <textarea id="bio"></textarea>

    <button id="saveBtn">Enregistrer</button>

  </div>

  <script type="module" src="/js/profile.js"></script>

</body>
</html>
