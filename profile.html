<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon profil • Perspikative</title>

<style>
body{
    margin:0;
    background:#111827;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    padding:50px;
}

.card{
    width:500px;
    background:#1f2937;
    border-radius:18px;
    padding:30px;
}

h1{
    margin-top:0;
}

.row{
    margin:18px 0;
}

.label{
    color:#9ca3af;
    font-size:14px;
}

.value{
    margin-top:5px;
    font-size:18px;
}
</style>

</head>
<body>

<div class="card">

<h1>Mon profil</h1>

<div class="row">
<div class="label">Nom d'utilisateur</div>
<div id="displayName" class="value">Chargement...</div>
</div>

<div class="row">
<div class="label">Adresse e-mail</div>
<div id="email" class="value">Chargement...</div>
</div>

<div class="row">
<div class="label">Date d'inscription</div>
<div id="created" class="value">Chargement...</div>
</div>

<div class="row">
<div class="label">UID</div>
<div id="uid" class="value">Chargement...</div>
</div>

</div>

<script type="module" src="/firebase-init.js"></script>
<script type="module" src="/js/profile.js"></script>

</body>
</html>
