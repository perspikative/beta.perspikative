    // --- UTILS (Tolérance fautes et accents) ---
    function normalizeText(str) {
      if (!str) return "";
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function levenshtein(a, b) {
      const matrix = [];
      for (let i = 0; i <= b.length; i++) matrix[i] = [i];
      for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
          else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
        }
      }
      return matrix[b.length][a.length];
    }

      "/draw": {
            text: "À toi de dessiner !",
            action: () => {
                  if (document.getElementById('doodle-svg')) return;
                  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                  svg.id = "doodle-svg";
                  svg.style = "position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:10000;pointer-events:all;touch-action:none;cursor:crosshair;";
                  document.body.appendChild(svg);
                  let isDrawing = false, points = [], currentPath = null;
                  const getCoords = (e) => {
                        const t = e.touches ? e.touches[0] : e;
                        return { x: t.clientX, y: t.clientY };
                  };
                  const startDrawing = (e) => {
                        isDrawing = true;
                        points = [getCoords(e)];
                        currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        currentPath.setAttribute("fill", "none");
                        currentPath.setAttribute("stroke", "#FFFFFF");
                        currentPath.setAttribute("stroke-width", "6");
                        currentPath.setAttribute("stroke-linecap", "round");
                        currentPath.setAttribute("stroke-linejoin", "round");
                        svg.appendChild(currentPath);
                  };
                  const draw = (e) => {
                        if (!isDrawing) return;
                        if (e.cancelable) e.preventDefault();
                        points.push(getCoords(e));
                        if (points.length > 2) {
                              let d = `M ${points[0].x} ${points[0].y}`;
                              for (let i = 1; i < points.length - 2; i++) {
                                    const xc = (points[i].x + points[i + 1].x) / 2;
                                    const yc = (points[i].y + points[i + 1].y) / 2;
                                    d += ` Q ${points[i].x} ${points[i].y} ${xc} ${yc}`;
                              }
                              const n = points.length;
                              d += ` Q ${points[n-2].x} ${points[n-2].y} ${points[n-1].x} ${points[n-1].y}`;
                              currentPath.setAttribute("d", d);
                        }
                  };
                  svg.addEventListener('mousedown', startDrawing);
                  window.addEventListener('mousemove', draw);
                  window.addEventListener('mouseup', () => { isDrawing = false; points = []; });
                  svg.addEventListener('touchstart', startDrawing, { passive: false });
                  svg.addEventListener('touchmove', draw, { passive: false });
                  svg.addEventListener('touchend', () => { isDrawing = false; points = []; });
            }

    const MAX_VISIBLE_THUMBS = 5;

    function renderLikedDrawings() {
      const grid = document.getElementById('likedDrawingsGrid');
      if (!grid) return;

      let likes = {};
      try { likes = JSON.parse(localStorage.getItem('prspk_likes')) || {}; } catch(e) {}

      const likedIds = Object.keys(likes).filter(id => !!likes[id] && creationsImgMap[id]);
      grid.innerHTML = '';

      if (likedIds.length === 0) {
        grid.innerHTML = `
          <div class="liked-drawings-empty" style="grid-column: 1 / -1;">
            <img src="/icons/like.svg" alt="">
            <span>Aucun coup de cœur pour l'instant</span>
          </div>`;
        return;
      }

      const visible = likedIds.slice(0, MAX_VISIBLE_THUMBS);
      const overflow = likedIds.length - MAX_VISIBLE_THUMBS;

      visible.forEach(id => {
        const src = '/portfolio/' + creationsImgMap[id];
        const url = '/portfolio/creations#' + id;
        const cell = document.createElement('div');
        cell.className = 'liked-drawing-thumb';
        cell.innerHTML = `<a href="${url}"><img src="${src}" alt="" loading="lazy"></a>`;
        grid.appendChild(cell);
      });

      if (overflow > 0) {
        // Le dessin derrière le + : on prend le 6e liké (index 5)
        const bgId = likedIds[MAX_VISIBLE_THUMBS];
        const bgSrc = bgId ? '/portfolio/' + creationsImgMap[bgId] : '';

        const more = document.createElement('button');
        more.type = 'button';
        more.className = 'liked-drawings-overflow';
        more.setAttribute('aria-label', 'Voir tous les coups de cœur');
        more.innerHTML = `
          ${bgSrc ? `<img src="${bgSrc}" alt="" class="liked-drawings-overflow-bg">` : ''}
          <span class="liked-drawings-overflow-label">+${overflow}</span>`;
        more.addEventListener('click', openLikedModal);
        grid.appendChild(more);
      }
    }

    function openLikedModal() {
      let likes = {};
      try { likes = JSON.parse(localStorage.getItem('prspk_likes')) || {}; } catch(e) {}
      const likedIds = Object.keys(likes).filter(id => !!likes[id] && creationsImgMap[id]);

      const overlay = document.createElement('div');
      overlay.id = 'likedModal';
      overlay.className = 'liked-modal-overlay';
      overlay.innerHTML = `
        <div class="liked-modal">
          <div class="liked-modal-header">
            <span class="liked-modal-title">Mes coups de cœur</span>
            <button type="button" class="liked-modal-close" aria-label="Fermer">
              <img src="/icons/fermer.svg" alt="Fermer">
            </button>
          </div>
          <div class="liked-modal-grid">
            ${likedIds.map(id => `
              <div class="liked-drawing-thumb">
                <a href="/portfolio/creations#${id}">
                  <img src="/portfolio/${creationsImgMap[id]}" alt="" loading="lazy">
                </a>
              </div>`).join('')}
          </div>
        </div>`;

      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('visible'));

      overlay.querySelector('.liked-modal-close').addEventListener('click', closeLikedModal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeLikedModal(); });
    }

    function closeLikedModal() {
      const overlay = document.getElementById('likedModal');
      if (!overlay) return;
      overlay.classList.add('closing');
      overlay.classList.remove('visible');
      overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
    }

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('searchResults');
    const defaultViews = document.getElementById('defaultViews');
    const historyContainer = document.getElementById('searchHistory');
    const historyList = document.getElementById('searchHistoryList');
    const clearHistoryBtn = document.getElementById('clearSearchHistory');
    const popularList = document.getElementById('popularList');

    const SEARCH_HISTORY_KEY = 'perspikative_search_history';
    const SEARCH_HISTORY_LIMIT = 5;
    let noResultTimer = null;

    // --- CONTENU POPULAIRE À METTRE EN AVANT ---
    const popularSearches = [
      { title: "i'm the orange of ur blue", icon: "/icons/projets-active.svg", url: "/portfolio/projets#im-the-orange-of-ur-blue" },
      { title: "Portfolio", icon: "/icons/portfolio-active.svg", url: "/portfolio" },

      { title: "Actus", icon: "/icons/actus-active.svg", url: "/actus" },
    ];

    function renderPopularContent() {
      if (!popularList) return;
      popularList.innerHTML = '';
      popularSearches.forEach(item => {
        const a = document.createElement('a');
        a.href = item.url;
        a.className = 'popular-item';
        a.innerHTML = `<img src="${item.icon}" alt=""><span>${item.title}</span>`;
        popularList.appendChild(a);
      });
    }

    function loadSearchHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }

    function saveSearchHistory(history) {
      localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history.slice(0, SEARCH_HISTORY_LIMIT)));
    }

    function addToSearchHistory(value) {
      const term = value.toLowerCase().trim();
      if (term.length < 2) return;
      const current = loadSearchHistory();
      const next = [term, ...current.filter(item => item !== term)].slice(0, SEARCH_HISTORY_LIMIT);
      saveSearchHistory(next);
      renderSearchHistory();
    }

    function renderSearchHistory() {
      const history = loadSearchHistory();
      historyList.innerHTML = '';
      history.forEach(term => {
        const itemBtn = document.createElement('button');
        itemBtn.type = 'button';
        itemBtn.className = 'history-item';
        itemBtn.dataset.term = term;
        const icon = document.createElement('img');
        icon.src = '/icons/rechercher.svg';
        icon.className = 'history-item-icon';
        const label = document.createElement('span');
        label.textContent = term;
        itemBtn.appendChild(icon);
        itemBtn.appendChild(label);
        historyList.appendChild(itemBtn);
      });
      historyContainer.hidden = history.length === 0;
    }

    // --- MOTEUR DE RECHERCHE ---
    function runSearch(query, rawValue) {
      if (noResultTimer) clearTimeout(noResultTimer);
      resultsContainer.innerHTML = '';
      const cleanQuery = normalizeText(query);
      
      const searchTerms = cleanQuery.split(/\s+/).filter(t => t.length >= 2);

      // --- UN SEUL BLOC EASTER EGGS ---
      for (let key in easterEggs) {
        if (normalizeText(key) === cleanQuery) {
          const egg = easterEggs[key];
          
          if (typeof egg.action === 'function') {
            egg.action();
          }

          let html = `<div class="easter-egg">`;
          if (egg.img) html += `<img src="${egg.img}" alt="Easter egg">`;
          if (egg.text) html += `<p>${egg.text}</p>`;
          html += `</div>`;
          resultsContainer.innerHTML = html;
          
          return;
        }
      }

      if (searchTerms.length === 0) return;

      let scoredResults = siteContent.map(item => {
        let score = 0;
        let matchedTermsCount = 0;
        const cleanTitle = normalizeText(item.title);
        const titleWords = cleanTitle.split(/\s+/);
        const tags = item.tags.split(/\s+/).map(t => normalizeText(t));

        searchTerms.forEach(term => {
          let hasMatch = false;

          if (cleanTitle.includes(term)) {
            score += 50;
            hasMatch = true;
          } else {
            titleWords.forEach(w => {
              if (levenshtein(w, term) <= 1) { score += 20; hasMatch = true; }
            });
          }

          tags.forEach(tag => {
            if (tag.includes(term)) { score += 20; hasMatch = true; }
          });

          if (hasMatch) matchedTermsCount++;
        });

        if (matchedTermsCount === searchTerms.length && searchTerms.length > 1) {
          score += 100;
        }

        return { ...item, score };
      });

      const filteredResults = scoredResults
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score);

      if (filteredResults.length === 0) {
        resultsContainer.innerHTML = `<div class="no-results-container"><div class="no-results-text">Aucun résultat pour "${rawValue}"</div></div>`;
        noResultTimer = setTimeout(() => {
          const container = resultsContainer.querySelector('.no-results-container');
          if (container) {
            const btn = document.createElement('a');
            btn.href = '/rechercher';
            btn.className = 'btn-search-again fade-in-btn';
            btn.textContent = 'Rechercher autre chose';
            container.appendChild(btn);
          }
        }, 1500);
      } else {
        filteredResults.forEach(item => {
          const imageSrc = item.img ? item.img : 'icons/rechercher.svg';
          resultsContainer.innerHTML += `
            <a href="${item.url}" class="result-item">
              <img src="${imageSrc}" alt="miniature" class="result-thumb">
              <div class="result-info">
                <h3>${item.title} <span class="badge-cat">${item.category}</span></h3>
                <p>Mots-clés : ${item.tags.substring(0, 40)}...</p>
              </div>
            </a>`;
        });
      }
    }

    searchInput.addEventListener('input', function(e) {
      const rawValue = e.target.value.trim();
      if (rawValue === '') {
        if (noResultTimer) clearTimeout(noResultTimer);
        resultsContainer.innerHTML = '';
        defaultViews.hidden = false;
        renderSearchHistory();
        return;
      }
      defaultViews.hidden = true;
      runSearch(rawValue.toLowerCase(), e.target.value);
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addToSearchHistory(searchInput.value);
    });

    searchInput.addEventListener('blur', function() {
      addToSearchHistory(searchInput.value);
      if (searchInput.value.trim() === '') {
        defaultViews.hidden = false;
        renderSearchHistory();
      }
    });

    resultsContainer.addEventListener('click', function(e) {
      if (e.target.closest('.result-item')) addToSearchHistory(searchInput.value);
    });

    historyList.addEventListener('click', function(e) {
      const item = e.target.closest('.history-item');
      if (!item) return;
      const term = item.dataset.term || '';
      searchInput.value = term;
      defaultViews.hidden = true;
      runSearch(term.toLowerCase(), term);
      addToSearchHistory(term);
      searchInput.focus();
    });

    clearHistoryBtn.addEventListener('click', function() {
      localStorage.removeItem(SEARCH_HISTORY_KEY);
      renderSearchHistory();
    });

    // Initialisation
    renderPopularContent();
    renderSearchHistory();
    renderLikedDrawings();

    const menuToggle = document.getElementById('menuToggle');
    if(menuToggle) {
        menuToggle.addEventListener('change', (e) => {
          document.body.classList.toggle('menu-open', e.target.checked);
        });
